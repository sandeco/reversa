site_name: Reversa
site_url: https://sandeco.github.io/reversa
site_description: Turn legacy systems into executable specifications for AI agents.
site_author: sandeco
repo_url: https://github.com/sandeco/reversa
repo_name: sandeco/reversa
edit_uri: edit/main/docs/
copyright: '"Reversa" by sandeco'

theme:
  name: material
  language: en
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - content.tooltips
  icon:
    repo: fontawesome/brands/github
    logo: material/magnify

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang:
        - pt
        - en
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
        - locale: pt
          name: Portuguese
          build: true
        - locale: es
          name: Spanish
          build: true

nav:
  - Home: index.md
  - Why Reversa: por-que-reversa.md
  - Installation: instalacao.md
  - How to use: uso.md
  - CLI: cli.md
  - Configuration: configuracao.md
  - Supported engines: engines.md
  - Analysis pipeline: pipeline.md
  - Confidence scale: escala-confianca.md
  - Agents:
    - Overview: agentes/index.md
    - Reversa Agents Core:
      - Reversa (Orchestrator): agentes/reversa.md
      - Guide with analogies: agentes/agents-help.md
      - Scout: agentes/scout.md
      - Soul Extractor: agentes/extract-soul.md
      - Archaeologist: agentes/arqueologo.md
      - Detective: agentes/detetive.md
      - Architect: agentes/arquiteto.md
      - Writer: agentes/redator.md
      - Reviewer: agentes/revisor.md
      - Visor: agentes/visor.md
      - Data Master: agentes/data-master.md
      - Design System: agentes/design-system.md
      - Reconstructor: agentes/reconstructor.md
    - Code New Project Agents:
      - Overview: newproject/index.md
      - The greenfield agents: newproject/agentes.md
    - Code Forward Agents:
      - Overview: forward/index.md
      - The Forward agents: forward/agentes.md
    - Migration Agents:
      - Overview: migracao/index.md
      - The 5 agents: migracao/agentes.md
      - Paradigm shift: migracao/paradigma.md
      - Strategies: migracao/estrategias.md
      - Brief schema: migracao/brief.md
    - Pricing and Size Agents:
      - Overview: pricing/index.md
    - Documentation Team:
      - Overview: documentation/index.md
      - The 4 visual agents: documentation/agentes.md
    - Translators N8N->Specs->Python:
      - N8N Translator: agentes/n8n.md
  - Generated outputs: saidas/index.md
  - Developing from specs: desenvolvendo-com-specs.md
  - Contributing: contribuindo.md

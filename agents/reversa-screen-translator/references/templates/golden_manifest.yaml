# golden/manifest.yaml
#
# Manifest of golden files emitted by Screen Translator. Inspector consumes this
# file to build constructive parity tests when the legacy oracle is available
# and capture was possible.
#
# In v1, automated capture via Docker/Wine/emulator is OQ-02 (not implemented).
# This manifest describes the suggested command per screen; the user runs it manually.
# In projects without an executable oracle, this file may exist empty (with a list of
# golden files where `present: false`) or may not exist at all, and Inspector ignores it.

schemaVersion: 1
generatedAt: <ISO-8601>
reversa:
  version: "x.y.z"
producedBy: screen-translator
sourcePlatform: <slug>
targetPlatform: <slug>
oracleAvailable: true | false
oracleHash: "sha256:<hash of the oracle binary or container, when applicable>"
oracleCommand: "<base command to invoke the oracle, e.g. 'docker run --rm -i legacy-atm:1.0'>"

normalizationRules:
  # Rules accepted in byte-for-byte comparison. Anything outside these rules is a real divergence.
  - lineEndings: "\n"           # convert CRLF → LF before comparing
  - trimTrailingSpaces: false   # default: never trim
  - stripAnsiColors: false      # default: never strip; ANSI is part of the contract
  - normalizeUtf8: true         # convert heterogeneous encoding to UTF-8
  - injectClock: "2026-01-01T00:00:00Z"  # fake clock for deterministic capture
  - seedRandom: 42              # fixed seed

screens:
  - name: <canonical-screen-name>
    legacyOrigin: "<file:line>"
    capture:
      command: "<full capture command, e.g. 'echo -e \"1\\n123456\\n0\\n\" | docker run --rm -i legacy-atm:1.0 > login_screen.txt'>"
      expectedExitCode: 0
      determinismStrategy: "fake-clock + fixed-seed"
    file: "login-screen.txt"       # path relative to _reversa_sdd/screens/golden/
    format: "ansi-byte-stream"      # ansi-byte-stream | png | html-css-snapshot | raw
    present: true                    # false when the user has not yet run the capture
    captureBy: "<user-name-or-CI>"
    capturedAt: "<ISO-8601>"
    sha256: "<hash of the captured file, or null when present=false>"
    deviations: [DEV-XXX, DEV-YYY]   # list of known deviations for this screen
    notes: "<specific observations, e.g. 'oracle emits trailing space that we ignore via trimTrailingSpaces during comparison'>"

  - name: <segunda-tela>
    # ...

# Screens for which deterministic capture was not possible.
nonDeterministic:
  - name: <screen-with-external-clock>
    reason: "<description of the non-determinism source>"
    fallback: "sample over N runs; golden file = content common to all"
    samples: 5
    deviations: [DEV-021]

# Screens in projects without a UI or in skipped mode.
skipped:
  reason: "<e.g. legacy system is pure batch, Screen Translator agent skipped>"
  emittedAt: <ISO-8601>

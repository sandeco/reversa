# Directories scanned by Publisher for auto-discovery of auxiliary HTML files.
# Found HTML files must have <meta name="reversa-category" content="..."> to be indexed.

scan_roots:
  - path: "_reversa_sdd/"
    description: "SDD specs and outputs from the Discovery and Migration agents."
  - path: ".reversa/"
    description: "Cross-cutting core artifacts."
    exclude:
      - ".reversa/documentation/"
      - ".reversa/_config/"
      - ".reversa/context/"

categories:
  - id: review
    label: "Code Reviews"
    description: "Annotated PRs generated by reversa-reviewer and similar agents."
  - id: design-system
    label: "Design System"
    description: "Living Design System do reversa-design-system."
  - id: diagram
    label: "Diagrams"
    description: "Annotated flowcharts and additional architectures."

limits:
  max_depth: 6
  timeout_seconds: 10

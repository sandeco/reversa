# Declarative list of artifacts expected in _reversa_sdd/ before starting the migration.
# Updating this list is a configuration change; it does not require editing the reversa-migrate agent.
#
# Each entry:
#   path: relative path inside _reversa_sdd/
#   kind: logical identifier of the artifact (informational, not strictly validated against front matter)
#   required: true blocks the pipeline if missing; false only logs a warning
#   minSchemaVersion: minimum expected schemaVersion (informational; absence is tolerated today)

schemaVersion: 1
artifacts:
  - path: "code-analysis.md"
    kind: code_analysis
    required: true
    minSchemaVersion: 1
  - path: "domain.md"
    kind: domain_model
    required: true
    minSchemaVersion: 1
  - path: "architecture.md"
    kind: architecture
    required: true
    minSchemaVersion: 1
  - path: "dependencies.md"
    kind: dependencies
    required: true
    minSchemaVersion: 1
  - path: "inventory.md"
    kind: legacy_inventory
    required: true
    minSchemaVersion: 1
  - path: "data-dictionary.md"
    kind: data_dictionary
    required: false
    minSchemaVersion: 1
  - path: "state-machines.md"
    kind: state_machines
    required: false
    minSchemaVersion: 1
  - path: "permissions.md"
    kind: permissions
    required: false
    minSchemaVersion: 1
  - path: "gaps.md"
    kind: gaps
    required: true
    minSchemaVersion: 1
  - path: "questions.md"
    kind: questions
    required: false
    minSchemaVersion: 1
  - path: "confidence-report.md"
    kind: confidence_report
    required: true
    minSchemaVersion: 1
  - path: "traceability/code-spec-matrix.md"
    kind: code_spec_matrix
    required: false
    minSchemaVersion: 1
  - path: "sdd"
    kind: sdd_dir
    required: false
    minSchemaVersion: 1

# Aliases:
# Legacy names accepted for compatibility with older versions of the discovery team.
# Each alias maps an "expected name" → list of accepted alternative names.
aliases:
  "domain.md":
    - "domain_model.md"
  "architecture.md":
    - "architecture_legacy.md"
  "code-analysis.md":
    - "code_analysis.md"
    - "process_flows.md"
  "inventory.md":
    - "legacy_inventory.md"

# Reversa — Project Configuration
# This file is managed by the installer. For customizations, edit config.user.toml

[project]
name = ""
version = "1.0.0"

[user]
name = ""
chat_language = "en"
doc_language = "English"

[output]
folder = "_reversa_sdd"

[agents]
installed = [
  "reversa-scout",
  "reversa-archaeologist",
  "reversa-detective",
  "reversa-architect",
  "reversa-writer",
  "reversa-reviewer",
  "reversa-visor",
  "reversa-data-master",
  "reversa-design-system",
  "reversa-extract-soul"
]

[engines]
installed = []

[analysis]
answer_mode = "chat"
doc_level = "complete"

# Organization of the specs generated by the agents.
# This section is filled in by Reversa after Scout suggests a structure
# and the user confirms the choice in the menu (right after the doc_level question).
# To show the menu again, remove the entire [specs] section and run Reversa again.
[specs]
layout = ""              # constant "feature-folder" after the first run
granularity = ""         # module | use-case | endpoint | hybrid | feature | custom
custom_folders = []      # filled only when granularity == "custom"
scout_suggestion = ""    # record of Scout's original suggestion, immutable after the 1st run
decided_at = ""          # ISO 8601 timestamp of the user's choice
